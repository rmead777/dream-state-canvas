<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sherpa AI</title>
    <meta name="description" content="Intent Manifestation Engine">
    <meta name="author" content="Intent Manifestation Engine" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light" />

    <!-- Icons -->
    <link rel="icon" type="image/jpeg" href="/sherpa-icon.jpg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/sherpa-icon.jpg" />

    <!-- iOS standalone support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sherpa" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Social / Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sherpa AI" />
    <meta property="og:description" content="Intent Manifestation Engine" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/JpP0E4L6iPVels9QXiODQL9yrKD2/social-images/social-1774669137997-b604ff26-1f88-458b-89bf-5fdbea5a96c8.webp" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Intent Manifestation Engine" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/JpP0E4L6iPVels9QXiODQL9yrKD2/social-images/social-1774669137997-b604ff26-1f88-458b-89bf-5fdbea5a96c8.webp" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the service worker for PWA installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Silently ignore registration failures — app works without it.
          });
        });
      }
    </script>
  </body>
</html>
